{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 1.5rem;">
        <i class="fas fa-leaf" style="font-size: 3rem; color: #059669;"></i>
        <h2 style="margin-top: 0.5rem;"><i class="fas fa-user-plus"></i> Register</h2>
    </div>
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user-md"></i> Role</label>
            <select name="role" class="form-control" required>
                <option value="doctor"><i class="fas fa-user-md"></i> Doctor</option>
                <option value="patient"><i class="fas fa-user"></i> Patient</option>
            </select>
        </div>
        <button type="submit" class="btn" style="width: 100%;"><i class="fas fa-user-plus"></i> Register</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Already have an account? <a href="/login"><i class="fas fa-sign-in-alt"></i> Login</a>
    </p>
</div>
{% endblock %}
