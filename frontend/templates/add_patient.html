{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Add New Patient</h2>
    <form method="POST">
        <div class="grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" class="form-control" required>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" step="0.1" name="height" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" step="0.1" name="weight" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Prakriti</label>
                <select name="prakriti" class="form-control" required>
                    <option>Vata</option>
                    <option>Pitta</option>
                    <option>Kapha</option>
                    <option>Vata-Pitta</option>
                    <option>Pitta-Kapha</option>
                    <option>Vata-Kapha</option>
                    <option>Tridoshic</option>
                </select>
            </div>
            <div class="form-group">
                <label>Dosha Imbalance</label>
                <select name="dosha_imbalance" class="form-control" required>
                    <option>Vata</option>
                    <option>Pitta</option>
                    <option>Kapha</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Allergies</label>
            <input type="text" name="allergies" class="form-control">
        </div>
        <div class="form-group">
            <label>Medical Conditions</label>
            <textarea name="medical_conditions" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Lifestyle Notes</label>
            <textarea name="lifestyle_notes" class="form-control" rows="2"></textarea>
        </div>

        <button type="submit" class="btn">Save Patient</button>
        <a href="/doctor_dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
