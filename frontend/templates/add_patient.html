{% extends 'base.html' %}

{% block content %}
<div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
    <a href="/doctor_dashboard" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    <h2><i class="fas fa-user-plus"></i> Add New Patient</h2>
</div>

<div class="card">
    <form method="POST">
        <div class="grid">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-birthday-cake"></i> Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-venus-mars"></i> Gender</label>
                <select name="gender" class="form-control" required>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-ruler-vertical"></i> Height (cm)</label>
                <input type="number" step="0.1" name="height" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-weight"></i> Weight (kg)</label>
                <input type="number" step="0.1" name="weight" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-spa"></i> Prakriti</label>
                <select name="prakriti" class="form-control" required>
                    <option>Vata</option>
                    <option>Pitta</option>
                    <option>Kapha</option>
                    <option>Vata-Pitta</option>
                    <option>Pitta-Kapha</option>
                    <option>Vata-Kapha</option>
                    <option>Tridoshic</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-balance-scale"></i> Dosha Imbalance</label>
                <select name="dosha_imbalance" class="form-control" required>
                    <option>Vata</option>
                    <option>Pitta</option>
                    <option>Kapha</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-allergies"></i> Allergies</label>
            <input type="text" name="allergies" class="form-control" placeholder="e.g., Nuts, Dairy, Pollen">
        </div>
        <div class="form-group">
            <label><i class="fas fa-stethoscope"></i> Medical Conditions</label>
            <textarea name="medical_conditions" class="form-control" rows="2" placeholder="e.g., Diabetes, Hypertension"></textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-notes-medical"></i> Lifestyle Notes</label>
            <textarea name="lifestyle_notes" class="form-control" rows="2" placeholder="e.g., Sedentary lifestyle, irregular meals"></textarea>
        </div>

        <button type="submit" class="btn"><i class="fas fa-save"></i> Save Patient</button>
        <a href="/doctor_dashboard" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
    </form>
</div>
{% endblock %}
